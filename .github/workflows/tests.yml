name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  php-coding-style:
    name: Check PHP coding style
    runs-on: ubuntu-latest
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: none
          tools: php-cs-fixer:v3
          coverage: none
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Check PHP coding style
        run: php-cs-fixer check --using-cache=no --diff --show-progress=dots --ansi --no-interaction

  php-syntax:
    name: Check PHP ${{ matrix.php-version }} Syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - "5.5"
          - "8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: opcache
          coverage: none
          tools: none
      - name: Check syntax
        uses: mlocati/check-php-syntax@v1
        with:
          fail-on-warnings: true
          exclude: |
            .php-cs-fixer.php
            test/service/EventListener7.php
            test/service/TestCase7.php
            test/service/TestCase9.php

  phpunit:
    name: PHPUnit with php${{ matrix.php-version }} (${{ matrix.os }}) ${{ matrix.additional-dependencies }}
    needs:
      - php-coding-style
      - php-syntax
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            php-version: "5.5"
          - os: ubuntu-latest
            php-version: "5.5"
            additional-dependencies: zendframework/zend-http
          - os: ubuntu-latest
            php-version: "5.6"
          - os: ubuntu-latest
            php-version: "5.6"
            additional-dependencies: guzzlehttp/guzzle
          - os: windows-latest
            php-version: "5.6"
          - os: ubuntu-latest
            php-version: "7.0"
          - os: ubuntu-latest
            php-version: "7.1"
          - os: ubuntu-latest
            php-version: "7.2"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "7.3"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "7.4"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "7.4"
            disable-composer-audit: true
            additional-dependencies: zendframework/zend-http
          - os: windows-latest
            php-version: "7.4"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.0"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.1"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.2"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.3"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.4"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.5"
            disable-composer-audit: true
          - os: ubuntu-latest
            php-version: "8.5"
            disable-composer-audit: true
            additional-dependencies: guzzlehttp/guzzle
          - os: windows-latest
            php-version: "8.5"
            disable-composer-audit: true
            additional-dependencies: guzzlehttp/guzzle
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          extensions: curl
          coverage: none
      - name: Checkout
        uses: actions/checkout@v6
      - name: Trust Composer dependencies
        if: matrix.disable-composer-audit
        run: composer config --ansi --no-interaction audit.block-insecure false
      - name: Adding ${{ matrix.additional-dependencies }} to composer dependencies
        if: matrix.additional-dependencies
        run: composer --no-update --ansi --no-interaction require ${{ matrix.additional-dependencies }}
      - name: Install Composer dependencies
        run: composer --ansi --no-interaction --no-progress --optimize-autoloader update
      - name: Run PHPUnit
        run: composer --ansi --no-interaction run-script test
